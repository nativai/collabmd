<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw — CollabMD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #root { width: 100%; height: 100%; }
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      color: #888;
      font-size: 14px;
    }
    .loading-state.error { color: #e55; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-state" id="loadingState">Loading Excalidraw...</div>
  </div>
  <script type="module" src="./excalidraw-editor-entry.js"></script>
</body>
</html>
