services:
  collabmd:
    image: ${COLLABMD_IMAGE:-ghcr.io/andes90/collabmd:latest}
    depends_on:
      - plantuml
    environment:
      HOST: 0.0.0.0
      PORT: 1234
      AUTH_STRATEGY: ${AUTH_STRATEGY:-none}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-collabmd_auth}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_MAX_AGE_MS: ${AUTH_SESSION_MAX_AGE_MS:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:1234}
      AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID:-}
      AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET:-}
      AUTH_OIDC_ALLOWED_EMAILS: ${AUTH_OIDC_ALLOWED_EMAILS:-}
      AUTH_OIDC_ALLOWED_DOMAINS: ${AUTH_OIDC_ALLOWED_DOMAINS:-}
      BASE_PATH: ${BASE_PATH:-}
      PUBLIC_WS_BASE_URL: ${PUBLIC_WS_BASE_URL:-}
      PLANTUML_SERVER_URL: http://plantuml:8080
      COLLABMD_VAULT_DIR: ${COLLABMD_VAULT_DIR:-/data}
      COLLABMD_GIT_REPO_URL: ${COLLABMD_GIT_REPO_URL:-}
      COLLABMD_GIT_SSH_PRIVATE_KEY_FILE: ${COLLABMD_GIT_SSH_PRIVATE_KEY_FILE:-}
      COLLABMD_GIT_SSH_PRIVATE_KEY_B64: ${COLLABMD_GIT_SSH_PRIVATE_KEY_B64:-}
      COLLABMD_GIT_SSH_KNOWN_HOSTS_FILE: ${COLLABMD_GIT_SSH_KNOWN_HOSTS_FILE:-}
      COLLABMD_GIT_USER_NAME: ${COLLABMD_GIT_USER_NAME:-}
      COLLABMD_GIT_USER_EMAIL: ${COLLABMD_GIT_USER_EMAIL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    ports:
      - "${COLLABMD_HOST_PORT:-1234}:1234"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${HOST_VAULT_DIR:-./data/vault}
        target: ${COLLABMD_VAULT_DIR:-/data}
      # Optional: mount secret files when using file-based SSH auth.
      # - type: bind
      #   source: ${HOST_SSH_KEY_FILE}
      #   target: /run/secrets/collabmd_git_key
      #   read_only: true
      # - type: bind
      #   source: ${HOST_KNOWN_HOSTS_FILE}
      #   target: /run/secrets/collabmd_known_hosts
      #   read_only: true

  plantuml:
    image: plantuml/plantuml-server:jetty
    ports:
      - "127.0.0.1:${PLANTUML_HOST_PORT:-18080}:8080"
    restart: unless-stopped
