{{- if .Values.plantuml.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "collabmd.plantumlFullname" . }}
  labels:
    {{- include "collabmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: plantuml
  {{- with .Values.plantuml.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.plantuml.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "collabmd.plantumlSelectorLabels" . | nindent 4 }}
{{- end }}
